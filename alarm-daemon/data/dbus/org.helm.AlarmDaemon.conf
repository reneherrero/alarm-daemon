<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  System-bus policy for org.helm.AlarmDaemon.

  Layout:
    - The dedicated `helm-alarm` user owns the well-known name (the daemon
      runs under that user, see data/systemd/alarm-daemon.service).
    - root may always send (recovery scripts, systemctl-driven repairs).
    - Members of the `helm` group may call methods. UI processes that need to
      arm/dismiss alarms should run with `helm` in their supplementary groups.
    - Everything else is denied.

  This is intentionally coarse-grained while polkit support is deferred. Once
  per-method polkit actions land, this file should drop the group rule and
  rely on `polkit_authority_check_authorization` calls inside the daemon.
-->
<busconfig>
  <policy user="helm-alarm">
    <allow own="org.helm.AlarmDaemon"/>
    <allow send_destination="org.helm.AlarmDaemon"/>
  </policy>

  <policy user="root">
    <allow send_destination="org.helm.AlarmDaemon"/>
  </policy>

  <policy group="helm">
    <allow send_destination="org.helm.AlarmDaemon"/>
  </policy>

  <policy context="default">
    <deny send_destination="org.helm.AlarmDaemon"/>
  </policy>
</busconfig>
