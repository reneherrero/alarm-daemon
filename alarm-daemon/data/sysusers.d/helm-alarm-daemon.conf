# systemd-sysusers(8) provisioning for the alarm daemon.
#
# Creates:
#   - the `helm` group (callers belong here),
#   - the `helm-alarm` system user (the daemon runs as this user),
#   - membership of `helm-alarm` in `helm` so the daemon can read/write the
#     custom-sounds directory.
#
# Type Name        ID GECOS                Home          Shell
g      helm        -
u      helm-alarm  -  "Helm alarm daemon"  /var/lib/helm /usr/sbin/nologin
m      helm-alarm  helm
