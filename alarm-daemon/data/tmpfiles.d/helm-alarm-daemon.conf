# systemd-tmpfiles(8) layout for /var/lib/helm.
#
# /var/lib/helm itself is owned by helm-alarm:helm with mode 0750 — only the
# daemon (and root) can read it. The custom-sounds subdirectory is mode 0775
# so members of `helm` can drop files in via an out-of-band tool, while the
# daemon (running as helm-alarm) retains write ownership.
#
# Type Path                  Mode UID         GID  Age Argument
d      /var/lib/helm         0750 helm-alarm  helm -   -
d      /var/lib/helm/sounds  0775 helm-alarm  helm -   -
