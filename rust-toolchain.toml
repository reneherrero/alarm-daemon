# Pinned toolchain for the alarm-daemon workspace.
#
# Contributors get the right channel + cross-compile targets installed
# automatically the first time they run any cargo command in this repo.
# `rust-version` in each crate's Cargo.toml still gates MSRV separately.
#
# The aarch64 target is here so `ci.sh` can run a no-link `cargo check`
# against it without any per-machine setup — it's the canonical Yocto board
# arch (RPi 4/5, NXP i.MX8, TI Sitara, NVIDIA Jetson, …). Add other targets
# to the list as needed.

[toolchain]
channel = "stable"
profile = "minimal"
components = ["rustfmt", "clippy"]
targets = ["aarch64-unknown-linux-gnu"]
