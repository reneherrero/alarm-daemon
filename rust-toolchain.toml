# Pinned toolchain for the alarm-daemon workspace.
#
# Contributors get the right channel + cross-compile targets installed
# automatically the first time they run any cargo command in this repo.
# `rust-version` in each crate's Cargo.toml still gates MSRV separately.
#
# Both supported production architectures are listed explicitly:
#
#   - x86_64-unknown-linux-gnu   — developer laptops, CI runners, x86
#                                  Yocto targets (NUC-class edge boxes).
#   - aarch64-unknown-linux-gnu  — canonical 64-bit ARM Yocto boards
#                                  (RPi 4/5, NXP i.MX8, TI Sitara,
#                                  NVIDIA Jetson, Apple-silicon Linux
#                                  VMs, …).
#
# Listing both (rather than relying on "the host is always x86") means
# `ci.sh` can always cross-check the non-host target regardless of which
# architecture a contributor is building on. rustup installs the rust-std
# for every target in this list on first use; the component is small
# (~40 MB) and the listing stays future-proof if/when we gain arm64 dev
# hardware.

[toolchain]
channel = "stable"
profile = "minimal"
components = ["rustfmt", "clippy"]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
]
